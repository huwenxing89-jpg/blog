server:
  port: 8088

spring:
  application:
    name: blog-backend
  # 数据源配置（双数据源：业务库 + 主应用认证库）
  datasource:
    # 主数据源 - 业务数据库
    primary:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      username: root
      password: 123456
      hikari:
        minimum-idle: 5
        maximum-pool-size: 20
    # 认证数据源 - 主应用数据库（qiankun）
    auth:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://localhost:3306/qiankun?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      username: root
      password: 123456
      hikari:
        minimum-idle: 2
        maximum-pool-size: 10
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
upload:
  path: uploads

  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: qiankun-micro-frontend-platform-jwt-secret-key-2026
  expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

name: Deploy Frontend to Windows Server

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build project
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Deploy to Windows Server
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_FRONTEND }}
        run: |
          # Install sshpass
          sudo apt-get update && sudo apt-get install -y sshpass

          echo "Deploying frontend to $DEPLOY_SERVER..."
          echo "Target path: $DEPLOY_PATH"

          # 将路径转换为 Windows 格式（正斜杠转反斜杠）
          WIN_PATH=$(echo "$DEPLOY_PATH" | sed 's/\//\\/g')
          echo "Windows 路径: $WIN_PATH"

          # Ensure target directory exists
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"if (-not (Test-Path '$WIN_PATH')) { New-Item -ItemType Directory -Path '$WIN_PATH' -Force }; if (-not (Test-Path '$WIN_PATH\\logs')) { New-Item -ItemType Directory -Path '$WIN_PATH\\logs' -Force }\""

          # Calculate local package-lock.json hash
          LOCAL_HASH=$(md5sum frontend/package-lock.json | cut -d' ' -f1)
          echo "Local package-lock.json hash: $LOCAL_HASH"

          # Get server hash if exists
          SERVER_HASH=$(sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"Get-Content '$WIN_PATH\\.moduleshash' -ErrorAction SilentlyContinue\"" || echo "")
          # Trim whitespace (including Windows carriage return)
          SERVER_HASH=$(echo "$SERVER_HASH" | tr -d '[:space:]')
          echo "Server cached hash: $SERVER_HASH"

          # Check if node_modules exists on server
          echo "Checking if node_modules exists on server..."
          NODE_MODULES_CHECK=$(sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"if (Test-Path '$WIN_PATH\\node_modules') { Write-Output 'EXISTS' } else { Write-Output 'NOT_EXISTS' }\"" 2>/dev/null || echo "NOT_EXISTS")
          # Trim whitespace
          NODE_MODULES_CHECK=$(echo "$NODE_MODULES_CHECK" | tr -d '[:space:]')
          echo "node_modules check result: '$NODE_MODULES_CHECK'"

          # Decide whether to upload node_modules
          UPLOAD_MODULES="no"
          if [ "$NODE_MODULES_CHECK" = "NOT_EXISTS" ]; then
            UPLOAD_MODULES="yes"
            echo "node_modules not found on server, will upload"
          elif [ "$SERVER_HASH" != "$LOCAL_HASH" ]; then
            UPLOAD_MODULES="yes"
            echo "Dependencies changed (hash mismatch), will upload node_modules"
          else
            echo "Using cached node_modules (hash match and exists)"
          fi

          # Create deployment package
          cd frontend

          # First, copy static files to standalone/.next/static (required by Next.js standalone)
          mkdir -p .next/standalone/.next/static
          cp -r .next/static/* .next/standalone/.next/static/

          # Copy public folder to standalone
          cp -r public .next/standalone/

          # Package from standalone directory using zip (better Windows compatibility)
          cd .next/standalone
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Checking server.js:"
          ls -la server.js 2>/dev/null || echo "server.js NOT found!"
          echo "Checking .next folder:"
          ls -la .next 2>/dev/null || echo ".next folder NOT found!"

          if [ "$UPLOAD_MODULES" = "yes" ]; then
            echo "Packaging with node_modules..."
            zip -r ~/frontend-deploy.zip .next node_modules server.js package.json public
          else
            echo "Packaging without node_modules (using cached)..."
            zip -r ~/frontend-deploy.zip .next server.js package.json public
          fi

          # Verify zip contents
          echo "Verifying zip contents..."
          unzip -l ~/frontend-deploy.zip | head -30

          # Upload deployment package
          echo "Uploading deployment package..."
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no -o ConnectTimeout=300 ~/frontend-deploy.zip ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/

          # Extract on server and save hash
          echo "Extracting files on server..."
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -NoProfile -Command \"Set-Location '$WIN_PATH'; Write-Host 'Current directory:'; Get-Location; Write-Host 'Files before extraction:'; Get-ChildItem | Select-Object Name, Length; Remove-Item -Recurse -Force .next,server.js,package.json,public,frontend-deploy.tar.gz -ErrorAction SilentlyContinue; Write-Host 'Extracting zip...'; if (Test-Path 'frontend-deploy.zip') { Write-Host 'Zip file size:'; (Get-Item 'frontend-deploy.zip').Length; Write-Host 'Zip contents:'; Add-Type -AssemblyName System.IO.Compression.FileSystem; [System.IO.Compression.ZipFile]::OpenRead('frontend-deploy.zip').Entries | Select-Object -First 20 FullName; Expand-Archive -Path frontend-deploy.zip -DestinationPath . -Force; Write-Host 'Extraction result:'; Get-ChildItem | Select-Object Name; Write-Host 'Checking server.js:'; if (Test-Path 'server.js') { Write-Host 'server.js found!' } else { Write-Host 'ERROR: server.js NOT found!' }; Write-Host 'Contents of .next folder if exists:'; if (Test-Path '.next') { Get-ChildItem .next | Select-Object Name }; Remove-Item frontend-deploy.zip -Force -ErrorAction SilentlyContinue } else { Write-Host 'ERROR: frontend-deploy.zip not found!' }; '$LOCAL_HASH' | Out-File -FilePath '.moduleshash' -Force -Encoding utf8\""

          echo "Frontend deployment complete!"

      - name: Restart Frontend Service
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_FRONTEND }}
        run: |
          # Upload start script
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no deploy/scripts/start-frontend.ps1 ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/

          # 将路径转换为 Windows 格式
          WIN_PATH=$(echo "$DEPLOY_PATH" | sed 's/\//\\/g')

          # Stop existing service
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -ExecutionPolicy Bypass -Command \"& '$WIN_PATH\\start-frontend.ps1' -Action Stop\""

          # Start new service
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -ExecutionPolicy Bypass -Command \"& '$WIN_PATH\\start-frontend.ps1' -Action Start\""

          echo "Frontend service restarted"

      - name: Health Check
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_FRONTEND }}
        run: |
          echo "Checking frontend service status..."

          # 将路径转换为 Windows 格式
          WIN_PATH=$(echo "$DEPLOY_PATH" | sed 's/\//\\/g')

          MAX_RETRIES=30
          RETRY_INTERVAL=5

          for i in $(seq 1 $MAX_RETRIES); do
            # 检查端口是否在监听（使用 PowerShell 更可靠）
            PORT_CHECK=$(sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"(netstat -ano | Select-String ':3000.*LISTENING').Count\"" 2>/dev/null || echo "0")

            if [ "$PORT_CHECK" -gt 0 ] 2>/dev/null; then
              echo "✅ Frontend service started successfully! Port 3000 is listening"
              # 显示日志最后几行
              sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"Get-Content '$WIN_PATH\\logs\\frontend.log' -Tail 10 -ErrorAction SilentlyContinue\""
              exit 0
            fi

            echo "Waiting for frontend service... ($i/$MAX_RETRIES)"

            # 如果是最后一次重试，显示错误日志
            if [ $i -eq $MAX_RETRIES ]; then
              echo "显示错误日志:"
              sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"Get-Content '$WIN_PATH\\logs\\frontend-error.log' -Tail 30 -ErrorAction SilentlyContinue\""
            fi

            sleep $RETRY_INTERVAL
          done

          echo "Frontend service startup timeout, please check logs"
          exit 1

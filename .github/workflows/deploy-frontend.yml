name: Deploy Frontend to Windows Server

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build project
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: Deploy to Windows Server
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_FRONTEND }}
        run: |
          # Install sshpass
          sudo apt-get update && sudo apt-get install -y sshpass

          echo "Deploying frontend to $DEPLOY_SERVER..."
          echo "Target path: $DEPLOY_PATH"

          # Upload helper scripts first
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no deploy/scripts/check-cache.ps1 ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/

          # Ensure target directory exists
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"if (-not (Test-Path '${DEPLOY_PATH}')) { New-Item -ItemType Directory -Path '${DEPLOY_PATH}' -Force }\""

          # Check if node_modules cache exists
          CACHE_EXISTS=$(sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -ExecutionPolicy Bypass -File '${DEPLOY_PATH}\\check-cache.ps1' -Path '${DEPLOY_PATH}'")

          # Calculate local package-lock.json hash
          LOCAL_HASH=$(md5sum frontend/package-lock.json | cut -d' ' -f1)
          echo "Local package-lock.json hash: $LOCAL_HASH"

          # Get server hash if exists
          if [ "$CACHE_EXISTS" = "yes" ]; then
            SERVER_HASH=$(sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"Get-Content '${DEPLOY_PATH}\\.moduleshash' -ErrorAction SilentlyContinue\"")
            echo "Server cached hash: $SERVER_HASH"
          else
            SERVER_HASH=""
          fi

          # Decide whether to upload node_modules
          UPLOAD_MODULES="no"
          if [ "$CACHE_EXISTS" != "yes" ] || [ "$SERVER_HASH" != "$LOCAL_HASH" ]; then
            UPLOAD_MODULES="yes"
            echo "Dependencies changed or cache missing, will upload node_modules"
          else
            echo "Using cached node_modules"
          fi

          # Create deployment package
          cd frontend
          if [ "$UPLOAD_MODULES" = "yes" ]; then
            # Full deployment with node_modules
            tar -czf ../frontend-deploy.tar.gz .next/standalone/.next .next/standalone/node_modules .next/standalone/server.js .next/standalone/package.json .next/static public
          else
            # Incremental deployment without node_modules
            tar -czf ../frontend-deploy.tar.gz .next/standalone/.next .next/standalone/server.js .next/standalone/package.json .next/static public
          fi

          # Upload deployment package
          echo "Uploading deployment package..."
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no -o ConnectTimeout=300 ../frontend-deploy.tar.gz ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/

          # Extract on server and save hash
          echo "Extracting files on server..."
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -Command \"cd '${DEPLOY_PATH}'; tar -xzf frontend-deploy.tar.gz; Remove-Item frontend-deploy.tar.gz -Force; '${LOCAL_HASH}' | Out-File -FilePath '.moduleshash' -Force -Encoding utf8\""

          echo "Frontend deployment complete!"

      - name: Restart Frontend Service
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH_FRONTEND }}
        run: |
          # Upload start script
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no deploy/scripts/start-frontend.ps1 ${DEPLOY_USER}@${DEPLOY_SERVER}:${DEPLOY_PATH}/

          # Stop existing service
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -ExecutionPolicy Bypass -Command \"& '${DEPLOY_PATH}\\start-frontend.ps1' -Action Stop\""

          # Start new service
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "powershell -ExecutionPolicy Bypass -Command \"& '${DEPLOY_PATH}\\start-frontend.ps1' -Action Start\""

          echo "Frontend service restarted"

      - name: Health Check
        env:
          DEPLOY_SERVER: ${{ secrets.DEPLOY_SERVER }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          echo "Checking frontend service status..."
          MAX_RETRIES=30
          RETRY_INTERVAL=5

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_SERVER} "curl -s -o /dev/null -w \"%{http_code}\" http://localhost:3000 2>/dev/null || echo 000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend service started successfully!"
              exit 0
            fi

            echo "Waiting for frontend service... ($i/$MAX_RETRIES)"
            sleep $RETRY_INTERVAL
          done

          echo "Frontend service startup timeout, please check logs"
          exit 0
